name: Node.js CI/CD a Render

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests
        run: npm test
        env:
          MONGO_URI: mongodb://localhost:27017/test_db

      - name: Cobertura de pruebas
        run: npm run test:coverage
        env:
          MONGO_URI: mongodb://localhost:27017/test_db

      - name: Construir imagen Docker
        run: docker build -t ud3-madoka:${{ github.sha }} .

      - name: Disparar despliegue en Render
        if: success()
        run: curl -f ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
